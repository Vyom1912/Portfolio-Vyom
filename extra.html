<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .heading {
        margin: 70px auto;
        text-align: center;
      }

      .heading h1 {
        font-size: 2.5rem;
        font-weight: 700;
        position: relative;
        display: inline-block;
        padding-bottom: 12px;
      }

      /* Animated underline */
      .heading h1::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: 35%;
        height: 2px;
        background: #000;
        transition: width 0.4s ease;
      }

      .heading h1:hover::after {
        width: 60%;
      }

      /* Center*

      .portfolio {
        max-width: 800px;
        margin: 40px auto;
        text-align: center;
      }

      .projects {
        display: grid;
        gap: 20px;
      }

      .project {
        padding: 30px;
        background: #f3f3f3;
        border-radius: 10px;
        font-size: 18px;
      }

      /* Hidden container */
      .more-projects {
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        transform: translateY(-10px);
        transition: max-height 0.6s ease, opacity 0.4s ease, transform 0.4s ease;
      }

      /* When active */
      .more-projects.show {
        max-height: 1000px; /* big enough for content */
        opacity: 1;
        transform: translateY(0);
      }

      .toggle-btn {
        margin-top: 25px;
        padding: 12px 30px;
        border: none;
        background: #000;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        border-radius: 25px;
        transition: background 0.3s;
      }

      .toggle-btn:hover {
        background: #333;
      }
    </style>
  </head>
  <body>
    <div
      class="heading"
      data-aos="fade-right"
      data-aos-duration="500"
      id="contect-1">
      <h1>Get In Touch</h1>
    </div>

    <section class="portfolio">
      <h2>My Projects</h2>

      <div class="projects">
        <!-- Always visible projects -->
        <div class="project">Project 1</div>
        <div class="project">Project 2</div>

        <!-- Hidden projects -->
        <div class="more-projects" id="moreProjects">
          <div class="project">Project 3</div>
          <div class="project">Project 4</div>
          <div class="project">Project 5</div>
        </div>
      </div>

      <button class="toggle-btn" id="toggleBtn">Show More</button>
    </section>

    <script>
      const toggleBtn = document.getElementById("toggleBtn");
      const moreProjects = document.getElementById("moreProjects");

      toggleBtn.addEventListener("click", () => {
        moreProjects.classList.toggle("show");

        toggleBtn.textContent = moreProjects.classList.contains("show")
          ? "Show Less"
          : "Show More";
      });
    </script>
  </body>
</html>
